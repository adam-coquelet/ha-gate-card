<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" rx="16" fill="#f5f5f5"/>

  <!-- === Card 1: Double Swing (Open) === -->
  <g transform="translate(20, 20)" filter="url(#shadow)">
    <rect width="270" height="340" rx="12" fill="#fff" stroke="#eaeaea"/>
    <!-- Header -->
    <text x="20" y="38" font-size="13" font-weight="500" fill="#171717">Portail principal</text>
    <rect x="175" y="22" width="76" height="22" rx="11" fill="#f0fdf4"/>
    <circle cx="188" cy="33" r="3" fill="#22c55e"/>
    <text x="196" y="37" font-size="12" font-weight="500" fill="#15803d">Ouvert</text>
    <!-- Scene -->
    <rect x="20" y="52" width="230" height="120" rx="8" fill="#fafafa" stroke="#eaeaea"/>
    <!-- Ground -->
    <rect x="20" y="148" width="230" height="24" rx="0" fill="#f5f5f5"/>
    <line x1="20" y1="148" x2="250" y2="148" stroke="#eaeaea"/>
    <!-- Pillars -->
    <rect x="46" y="72" width="10" height="80" rx="3" fill="#d4d4d4"/>
    <rect x="214" y="72" width="10" height="80" rx="3" fill="#d4d4d4"/>
    <!-- Left leaf (open - rotated) -->
    <g transform="translate(56, 80)">
      <g transform="skewY(-8) scaleX(0.3)">
        <rect width="74" height="64" rx="2" fill="#fff" stroke="#eaeaea"/>
        <line x1="15" y1="14" x2="59" y2="14" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
        <line x1="15" y1="26" x2="59" y2="26" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
        <line x1="15" y1="38" x2="59" y2="38" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
        <line x1="15" y1="50" x2="59" y2="50" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
      </g>
    </g>
    <!-- Right leaf (open - rotated) -->
    <g transform="translate(214, 80)">
      <g transform="skewY(8) scaleX(-0.3)">
        <rect width="74" height="64" rx="2" fill="#fff" stroke="#eaeaea"/>
        <line x1="15" y1="14" x2="59" y2="14" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
        <line x1="15" y1="26" x2="59" y2="26" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
        <line x1="15" y1="38" x2="59" y2="38" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
        <line x1="15" y1="50" x2="59" y2="50" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
      </g>
    </g>
    <!-- Button -->
    <rect x="20" y="186" width="230" height="40" rx="8" fill="#171717"/>
    <text x="135" y="211" font-size="13" font-weight="500" fill="#fff" text-anchor="middle">Fermer</text>
  </g>

  <!-- === Card 2: Single Swing (Closed) === -->
  <g transform="translate(310, 20)" filter="url(#shadow)">
    <rect width="270" height="340" rx="12" fill="#fff" stroke="#eaeaea"/>
    <!-- Header -->
    <text x="20" y="38" font-size="13" font-weight="500" fill="#171717">Portillon</text>
    <rect x="175" y="22" width="76" height="22" rx="11" fill="#fafafa"/>
    <circle cx="188" cy="33" r="3" fill="#999"/>
    <text x="196" y="37" font-size="12" font-weight="500" fill="#666">Fermé</text>
    <!-- Scene -->
    <rect x="20" y="52" width="230" height="120" rx="8" fill="#fafafa" stroke="#eaeaea"/>
    <!-- Ground -->
    <rect x="20" y="148" width="230" height="24" rx="0" fill="#f5f5f5"/>
    <line x1="20" y1="148" x2="250" y2="148" stroke="#eaeaea"/>
    <!-- Pillars -->
    <rect x="46" y="72" width="10" height="80" rx="3" fill="#d4d4d4"/>
    <rect x="214" y="72" width="10" height="80" rx="3" fill="#d4d4d4"/>
    <!-- Single leaf (closed - flat) -->
    <rect x="56" y="80" width="158" height="64" rx="2" fill="#fff" stroke="#eaeaea"/>
    <line x1="76" y1="94" x2="194" y2="94" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
    <line x1="76" y1="106" x2="194" y2="106" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
    <line x1="76" y1="118" x2="194" y2="118" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
    <line x1="76" y1="130" x2="194" y2="130" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
    <!-- Button -->
    <rect x="20" y="186" width="230" height="40" rx="8" fill="#171717"/>
    <text x="135" y="211" font-size="13" font-weight="500" fill="#fff" text-anchor="middle">Ouvrir</text>
  </g>

  <!-- === Card 3: Sliding (Opening) === -->
  <g transform="translate(600, 20)" filter="url(#shadow)">
    <rect width="280" height="340" rx="12" fill="#fff" stroke="#eaeaea"/>
    <!-- Header -->
    <text x="20" y="38" font-size="13" font-weight="500" fill="#171717">Portail coulissant</text>
    <rect x="170" y="22" width="92" height="22" rx="11" fill="#fffbeb"/>
    <circle cx="183" cy="33" r="3" fill="#f59e0b"/>
    <text x="191" y="37" font-size="12" font-weight="500" fill="#a16207">Ouverture…</text>
    <!-- Scene -->
    <rect x="20" y="52" width="240" height="120" rx="8" fill="#fafafa" stroke="#eaeaea"/>
    <!-- Ground -->
    <rect x="20" y="148" width="240" height="24" rx="0" fill="#f5f5f5"/>
    <line x1="20" y1="148" x2="260" y2="148" stroke="#eaeaea"/>
    <!-- Track -->
    <line x1="40" y1="152" x2="240" y2="152" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
    <!-- Posts -->
    <rect x="40" y="72" width="8" height="80" rx="3" fill="#d4d4d4"/>
    <rect x="232" y="72" width="8" height="80" rx="3" fill="#d4d4d4"/>
    <!-- Sliding panel (half open) -->
    <rect x="120" y="80" width="112" height="64" rx="2" fill="#fff" stroke="#eaeaea" opacity="0.85"/>
    <line x1="132" y1="96" x2="132" y2="130" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
    <line x1="148" y1="96" x2="148" y2="130" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
    <line x1="164" y1="96" x2="164" y2="130" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
    <line x1="180" y1="96" x2="180" y2="130" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
    <line x1="196" y1="96" x2="196" y2="130" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
    <line x1="212" y1="96" x2="212" y2="130" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
    <!-- Button -->
    <rect x="20" y="186" width="240" height="40" rx="8" fill="#171717"/>
    <text x="140" y="211" font-size="13" font-weight="500" fill="#fff" text-anchor="middle">Ouvrir</text>
  </g>

  <!-- Labels -->
  <text x="155" y="374" font-size="11" font-weight="600" fill="#a1a1a1" text-anchor="middle" letter-spacing="0.5">DOUBLE SWING</text>
  <text x="445" y="374" font-size="11" font-weight="600" fill="#a1a1a1" text-anchor="middle" letter-spacing="0.5">SINGLE SWING</text>
  <text x="740" y="374" font-size="11" font-weight="600" fill="#a1a1a1" text-anchor="middle" letter-spacing="0.5">SLIDING</text>
</svg>
