<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171717"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Left pillar -->
  <rect x="112" y="128" width="24" height="220" rx="6" fill="#525252"/>
  <rect x="112" y="128" width="24" height="220" rx="6" fill="#fff" opacity="0.15"/>

  <!-- Right pillar -->
  <rect x="376" y="128" width="24" height="220" rx="6" fill="#525252"/>
  <rect x="376" y="128" width="24" height="220" rx="6" fill="#fff" opacity="0.15"/>

  <!-- Left gate leaf -->
  <g transform="translate(136, 158)">
    <rect width="110" height="160" rx="4" fill="#fff" opacity="0.9"/>
    <line x1="22" y1="32" x2="88" y2="32" stroke="#d4d4d4" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="56" x2="88" y2="56" stroke="#d4d4d4" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="80" x2="88" y2="80" stroke="#d4d4d4" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="104" x2="88" y2="104" stroke="#d4d4d4" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="128" x2="88" y2="128" stroke="#d4d4d4" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Right gate leaf -->
  <g transform="translate(266, 158)">
    <rect width="110" height="160" rx="4" fill="#fff" opacity="0.9"/>
    <line x1="22" y1="32" x2="88" y2="32" stroke="#d4d4d4" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="56" x2="88" y2="56" stroke="#d4d4d4" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="80" x2="88" y2="80" stroke="#d4d4d4" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="104" x2="88" y2="104" stroke="#d4d4d4" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="128" x2="88" y2="128" stroke="#d4d4d4" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Warning light on left pillar -->
  <circle cx="124" cy="118" r="10" fill="#f59e0b"/>
  <circle cx="124" cy="118" r="16" fill="#f59e0b" opacity="0.2"/>
  <circle cx="124" cy="118" r="22" fill="#f59e0b" opacity="0.08"/>

  <!-- Ground line -->
  <line x1="80" y1="348" x2="432" y2="348" stroke="#525252" stroke-width="3" stroke-linecap="round"/>
</svg>
